    <h2 id="definicion">¿Qué es un filtro de agua?</h2>
    <p>
        Un filtro de agua es un dispositivo diseñado para retener impurezas físicas, químicas y biológicas. Su función principal es mejorar la calidad, el olor y el sabor del agua, convirtiéndola en una opción más segura y saludable para el consumo humano y las actividades diarias. Elimina bacterias, óxido, cloro y otros contaminantes mediante barreras físicas, biológicas o químicas.
    </p>

    <h2>¿Cómo ayudan a reducir plásticos?</h2>
    <p>
        Cada año generamos más de 300 millones de toneladas de residuos plásticos en todo el mundo. La mayoría no se recicla y unos ocho millones de toneladas acaban en los océanos. Al usar filtros, disminuimos drásticamente la compra de agua embotellada, reduciendo así la contaminación y ayudando al medio ambiente.
    </p>

    <h3 id="beneficios"><u><i><b>BENEFICIOS</b></i></u></h3>
    <ol type="I">
        <li>Mejora el sabor y olor del agua.</li>
        <li>Reduce la presencia de contaminantes y metales pesados.</li>
        <li>Ayuda a proteger la salud eliminando bacterias y virus.</li>
        <li>Disminuye el uso de botellas de plástico y ahorra dinero.</li>
    </ol>

    <h3 id="tipos">Tipos de filtros de agua</h3>
    <table>
        <tr>
            <th bgcolor="pink">Tipo</th>
            <th bgcolor="pink">Función</th>
            <th bgcolor="pink">Durabilidad</th>
        </tr>
        <tr>
            <td>Luz ultravioleta</td>
            <td>Esteriliza el agua eliminando el 99% de microorganismos patógenos, bacterias y virus.</td>
            <td>Aproximadamente 1 año</td>
        </tr>
        <tr> 
            <td>Carbón activado</td>
            <td>Elimina el cloro, olores, pesticidas y mejora drásticamente el sabor y olor del agua.</td>
            <td>De 2 a 6 meses</td>
        </tr>
        <tr>
            <td>Ósmosis inversa</td>
            <td>Elimina hasta el 99% de sólidos disueltos, metales pesados, bacterias y virus para máxima pureza.</td>
            <td>De 2 a 3 años</td>
        </tr>
    </table>

    <h4 id="casero">Elaboración de un filtro de agua casero</h4>
    <ul type="circle">
        <li>Corta una botella plástica por la mitad, invierte la parte superior y colócala sobre la base.</li>
        <li>Pon algodón o tela limpia en la boquilla para retener los materiales.</li>
        <li>Agrega capas en este orden: 3 cm de carbón activado, 4 cm de arena fina, 3 cm de grava.</li>
        <li>Lava el filtro pasando agua limpia varias veces hasta que salga transparente.</li>
        <li>Vierte el agua sucia lentamente y recoge el agua filtrada en la parte de abajo.</li>
    </ul>
